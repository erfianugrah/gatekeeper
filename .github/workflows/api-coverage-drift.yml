name: API coverage drift

# Scheduled upstream-schema drift detection. The hermetic test (test/api-coverage.test.ts)
# runs in `npm test` and only checks the committed baseline; THIS job reaches the network,
# fetches the live Supabase + Cloudflare specs, and fails (opening a tracking issue) when an
# upstream adds/moves/removes an endpoint the proxy doesn't yet handle. See
# scripts/api-coverage/README.md.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: api-coverage-drift
  cancel-in-progress: false

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Check API coverage drift
        id: drift
        run: |
          set +e
          npm run check:api-coverage 2>&1 | tee drift-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Open or update drift issue
        if: steps.drift.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="API coverage drift detected"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "The scheduled API-coverage drift check failed — an upstream API likely changed."
            echo
            echo "Run: $run_url"
            echo
            echo '```'
            cat drift-output.txt
            echo '```'
            echo
            echo "Fix: review the drift, run \`npm run api-coverage:write\`, and commit the snapshot diff"
            echo "(deciding per new op whether it needs a classifier rule or an allowlist entry)."
            echo "See \`scripts/api-coverage/README.md\`."
          } > drift-issue-body.md

          existing=$(gh issue list --state open --json number,title \
            --jq ".[] | select(.title==\"$title\") | .number" | head -n1)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file drift-issue-body.md
          else
            gh issue create --title "$title" --body-file drift-issue-body.md
          fi

      - name: Fail the run if drift detected
        if: steps.drift.outputs.exit_code != '0'
        run: |
          echo "::error::API coverage drift detected — see the tracking issue and run output above."
          exit 1
