name: Supabase live smoke (scheduled)

on:
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: supabase-live-smoke-scheduled
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Scheduled Supabase live smoke (staging)
        env:
          GATEKEEPER_URL: https://gatekeeper-staging.anugrah.workers.dev
          GATEKEEPER_ADMIN_KEY: ${{ secrets.STAGING_ADMIN_KEY }}
          SUPABASE_SMOKE_PAT: ${{ secrets.SUPABASE_SMOKE_PAT }}
          SUPABASE_SMOKE_METRICS_SECRET: ${{ secrets.SUPABASE_SMOKE_METRICS_SECRET }}
          SUPABASE_SMOKE_METRICS_REF: ${{ secrets.SUPABASE_SMOKE_METRICS_REF }}
          SUPABASE_SMOKE_ENABLE_WRITE_PROBE: '1'
        run: |
          if [ -z "$GATEKEEPER_ADMIN_KEY" ]; then
            echo "::notice::STAGING_ADMIN_KEY not set — skipping scheduled Supabase live smoke."
            exit 0
          fi
          if [ -z "$SUPABASE_SMOKE_PAT" ]; then
            echo "::error::SUPABASE_SMOKE_PAT is required for scheduled live PAT scope verification."
            exit 1
          fi
          if [ -z "$SUPABASE_SMOKE_METRICS_SECRET" ] || [ -z "$SUPABASE_SMOKE_METRICS_REF" ]; then
            echo "::notice::SUPABASE_SMOKE_METRICS_SECRET and/or SUPABASE_SMOKE_METRICS_REF not set — metrics live tier will self-skip."
          fi
          bunx tsx cli/smoke-supabase.ts
