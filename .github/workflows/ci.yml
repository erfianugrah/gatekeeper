name: CI

# Correctness gate on every push to main and every PR. Mirrors `npm run preflight`
# (typecheck + lint + test + check:openapi + build) so what passes locally is what CI enforces.
# The api-coverage hermetic test runs as part of `npm test` here; upstream-schema drift is a
# separate scheduled job (api-coverage-drift.yml).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix dashboard

      - name: Preflight (typecheck + lint + test + openapi + build)
        run: npm run preflight
