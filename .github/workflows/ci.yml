name: CI

# Correctness gate on every push to main and every PR. Mirrors `bun run preflight`
# (typecheck + lint + test + check:openapi + build) so what passes locally is what CI enforces.
# The api-coverage hermetic test runs as part of `bun run test` here; upstream-schema drift is a
# separate scheduled job (api-coverage-drift.yml).
#
# Continuous deployment is gated on preflight (`needs: preflight`) so a red suite never ships:
#   • push to main      → deploy the `staging` Worker (gatekeeper-staging.workers.dev)
#   • push tag v*        → deploy the `production` Worker (gate.erfi.io)
#   • workflow_dispatch  → deploy the chosen environment manually
# Deploys authenticate with the scoped CLOUDFLARE_API_TOKEN repo secret (Workers Scripts + D1
# on the account, Workers Routes + Zone Read on erfi.io) — never the dev-box global API key.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        type: choice
        options: [staging, production]
        default: staging

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd dashboard && bun install --frozen-lockfile

      # The worker test pool (@cloudflare/vitest-pool-workers) loads wrangler.jsonc, whose
      # assets.directory points at dashboard/dist — it must exist before `bun run test` runs, and
      # preflight builds it only at the end. Build it up front in clean CI checkouts.
      - name: Build dashboard (required by worker test pool)
        run: bun run build:dashboard

      - name: Preflight (typecheck + lint + test + openapi + build)
        run: bun run preflight

  # Browser-level checks that the worker test pool can't catch — most importantly the
  # run_worker_first asset-layer wiring (vitest calls app.fetch directly, bypassing the
  # asset layer, so a missing run_worker_first prefix is invisible there but breaks in
  # wrangler dev / prod). Playwright boots wrangler dev via its webServer config.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd dashboard && bun install --frozen-lockfile

      # wrangler dev serves assets.directory → dashboard/dist; it must exist before the
      # Playwright webServer boots the worker.
      - name: Build dashboard
        run: bun run build:dashboard

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run E2E (Playwright + wrangler dev)
        run: bun run test:e2e
        env:
          CI: "true"

  deploy:
    needs: [preflight, e2e]
    # Never deploy on pull_request. main → staging, tag v* → production, manual → chosen env.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment) || (startsWith(github.ref, 'refs/tags/v') && 'production') || 'staging' }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          cd dashboard && bun install --frozen-lockfile

      - name: Build dashboard
        run: bun run build:dashboard

      - name: Resolve target environment
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ inputs.environment }}"
          elif [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
            TARGET="production"
          else
            TARGET="staging"
          fi
          echo "env=$TARGET" >> "$GITHUB_OUTPUT"
          # Production is the top-level config (bare deploy, matching `bun run deploy`);
          # only named environments take --env. So prod gets no flag, staging gets --env staging.
          if [ "$TARGET" = "production" ]; then
            echo "args=" >> "$GITHUB_OUTPUT"
          else
            echo "args=--env $TARGET" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy (${{ steps.target.outputs.env }})
        run: bunx wrangler deploy ${{ steps.target.outputs.args }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # Live Supabase smoke against the just-deployed STAGING worker — this is what
  # staging is for. The synthetic tier always runs; the live tier (real PAT swap →
  # real Supabase Management API, all scopes + isolation) runs when the secrets are
  # present. Staging only (push to main); the step skips cleanly if secrets are unset,
  # so the gate never blocks a deploy before the secrets are configured.
  live-smoke:
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Live Supabase smoke (staging)
        env:
          GATEKEEPER_URL: https://gatekeeper-staging.anugrah.workers.dev
          GATEKEEPER_ADMIN_KEY: ${{ secrets.STAGING_ADMIN_KEY }}
          SUPABASE_SMOKE_PAT: ${{ secrets.SUPABASE_SMOKE_PAT }}
          SUPABASE_SMOKE_METRICS_SECRET: ${{ secrets.SUPABASE_SMOKE_METRICS_SECRET }}
          SUPABASE_SMOKE_METRICS_REF: ${{ secrets.SUPABASE_SMOKE_METRICS_REF }}
          SUPABASE_SMOKE_ENABLE_WRITE_PROBE: "1"
        run: |
          if [ -z "$GATEKEEPER_ADMIN_KEY" ]; then
            echo "::notice::STAGING_ADMIN_KEY not set — skipping live Supabase smoke (synthetic + live)."
            exit 0
          fi
          if [ -z "$SUPABASE_SMOKE_PAT" ]; then
            echo "::notice::SUPABASE_SMOKE_PAT not set — running synthetic tier only (live tier will self-skip)."
          fi
          if [ -z "$SUPABASE_SMOKE_METRICS_SECRET" ] || [ -z "$SUPABASE_SMOKE_METRICS_REF" ]; then
            echo "::notice::SUPABASE_SMOKE_METRICS_SECRET and/or SUPABASE_SMOKE_METRICS_REF not set — metrics live tier will self-skip."
          fi
          bunx tsx cli/smoke-supabase.ts
